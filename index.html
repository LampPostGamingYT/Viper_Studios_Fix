<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viper Studios Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --main-color:#00aaff;
  --bg-main:#05070d;
  --bg-card:#0f172a;
}
html, body {
  margin:0; padding:0; height:100%;
  font-family:'Fredoka',sans-serif;
  background:linear-gradient(135deg,var(--bg-main),#0a0a0a);
  color:white; overflow:hidden;
}
.auth{display:flex;justify-content:center;align-items:center;height:100vh;}
.box{
  background:rgba(0,0,0,0.9);
  padding:30px; border-radius:20px;
  width:350px; text-align:center;
  box-shadow:0 5px 25px rgba(0,170,255,0.2);
}
input, select, textarea{
  width:100%; padding:12px; margin-top:10px;
  border-radius:12px; border:none;
  background:var(--bg-card); color:white; outline:none;
}
button{
  margin-top:12px; padding:12px; width:100%;
  border:none; border-radius:12px;
  background:linear-gradient(90deg,var(--main-color),#0044ff);
  cursor:pointer; transition:0.2s; font-weight:600;
}
button:hover{transform:scale(1.05);}
.dashboard{display:none;height:100vh;display:flex;}
.sidebar{
  width:250px; background:#020617;
  padding:20px; display:flex; flex-direction:column;
}
.sidebar button{margin-bottom:10px; text-align:left;}
.sidebar button:hover{background:linear-gradient(90deg,var(--main-color),#0044ff);}
.main{flex:1; padding:25px; overflow-y:auto;}
.card{background:var(--bg-card); padding:20px; border-radius:15px; margin-bottom:15px;}
.user-card{background:#020617; padding:15px; border-radius:15px; margin-bottom:10px;}
.popup{position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center;
}
.popup-box{background:var(--bg-card); padding:20px; border-radius:15px; width:400px; text-align:center;}
select{appearance:none;}
</style>
</head>

<body>
<div class="auth" id="auth">
  <div class="box">
    <h2>Viper Studios</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <input id="key" placeholder="VIP Key (if you have)">
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="sidebar">
    <button onclick="viewHome()">🏠 Home</button>
    <button onclick="viewUsers()">👥 Users</button>
    <button onclick="viewKeys()">🔑 Keys</button>
    <button onclick="viewSettings()">⚙️ Settings</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
  <div class="main" id="content"></div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h3 id="popupTitle"></h3>
    <div id="popupContent"></div>
    <button onclick="closePopup()">Dismiss</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-auth.js";

// ------------------ Firebase config ------------------
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
const content = document.getElementById("content");
const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");
const popupContent = document.getElementById("popupContent");

// ---------------------- KEYS ----------------------
async function checkKey(inputKey) {
  if(!inputKey) return false;
  const keysSnap = await getDocs(collection(db,"keys"));
  return keysSnap.docs.some(doc=>doc.data().key === inputKey);
}

async function genKey() {
  const newKey = "VIP-" + Math.random().toString(36).substr(2,8).toUpperCase();
  const keyId = crypto.randomUUID();
  await setDoc(doc(db,"keys",keyId),{key:newKey});
  return newKey;
}

// ---------------------- LOGIN ----------------------
async function login() {
  const u = username.value.trim();
  const p = password.value.trim();
  const k = key.value.trim();
  if(!u||!p) return alert("Fill all fields");

  try {
    const email = u+"@viper.local";
    const userCred = await signInWithEmailAndPassword(auth,email,p);
    const uid = userCred.user.uid;

    let userDoc = await getDoc(doc(db,"users",uid));
    if(!userDoc.exists()){
      let role = "User";
      let accessDoc = await getDoc(doc(db,"access",uid));
      if(accessDoc.exists() && accessDoc.data().access === true) role="VIP";
      else if(await checkKey(k)) role="VIP";

      await setDoc(doc(db,"users",uid),{
        username:u, role:role, warnings:[], banned:false
      });
      userDoc = await getDoc(doc(db,"users",uid));
    }

    currentUser = userDoc.data();
    showDash();
    listenUser(uid);

  } catch(e){
    alert("Login failed");
  }
}

// ---------------------- DASHBOARD ----------------------
function showDash(){
  auth.style.display="none";
  dashboard.style.display="flex";
  viewHome();
}

function viewHome(){
  content.innerHTML=`<h2>Welcome ${currentUser.username}</h2>
  <div class="card">Role: ${currentUser.role}</div>`;
}

// ---------------------- USERS ----------------------
async function viewUsers(){
  if(currentUser.role!=="Owner" && currentUser.role!=="Admin"){
    content.innerHTML="No permission"; return;
  }
  content.innerHTML="<h2>Users</h2>";
  const usersSnap = await getDocs(collection(db,"users"));
  usersSnap.forEach(docSnap=>{
    const u = docSnap.data();
    content.innerHTML+=`
      <div class="user-card">
        ${u.username} (${u.role}) ${u.banned?"[BANNED]":""}<br>
        Warnings: ${u.warnings.length}<br>
        <button onclick='warn("${docSnap.id}")'>Warn</button>
        <button onclick='ban("${docSnap.id}")'>Ban</button>
        ${currentUser.role==="Owner" && u.role!=="Owner" ? `<button onclick='makeAdmin("${docSnap.id}")'>Make Admin</button>`:""}
      </div>`;
  });
}

// ---------------------- WARN / BAN ----------------------
async function warn(uid){
  const uDoc = doc(db,"users",uid);
  const uSnap = await getDoc(uDoc);
  const uData = uSnap.data();
  if(uData.warnings.length>0) return; // only once
  const reason = prompt("Reason for warning");
  if(!reason) return;
  await updateDoc(uDoc,{warnings:[reason]});
  openPopup("⚠ You have been warned","Reason: "+reason);
}

async function ban(uid){
  const uDoc = doc(db,"users",uid);
  const uSnap = await getDoc(uDoc);
  const uData = uSnap.data();
  if(uData.role==="Owner"){ alert("Cannot ban Owner"); return; }
  await updateDoc(uDoc,{banned:true});
  openPopup("⛔ You have been banned","You were banned by admin.<br><button onclick='closePopup()'>Dismiss</button>");
}

// ---------------------- ADMIN ----------------------
async function makeAdmin(uid){
  const uDoc = doc(db,"users",uid);
  const uSnap = await getDoc(uDoc);
  const uData = uSnap.data();
  if(uData.role==="Owner"){ alert("Cannot change Owner"); return; }
  await updateDoc(uDoc,{role:"Admin"});
  alert(`${uData.username} is now Admin`);
}

// ---------------------- POPUP ----------------------
function openPopup(title,message){
  popup.style.display="flex";
  popupTitle.innerText = title;
  popupContent.innerHTML = message;
}
function closePopup(){popup.style.display="none";}

// ---------------------- LISTEN USER ----------------------
function listenUser(uid){
  const docRef = doc(db,"users",uid);
  docRef.onSnapshot(docSnap=>{
    const u = docSnap.data();
    if(!u) return;
    if(u.banned){
      openPopup("⛔ You are banned","You were banned by admin.<br><button onclick='closePopup()'>Dismiss</button>");
      setTimeout(()=>location.reload(),3000);
    }
    if(u.warnings.length>0){
      openPopup("⚠ You have been warned","Reason: "+u.warnings[0]+"<br><button onclick='closePopup()'>Dismiss</button>");
    }
  });
}

// ---------------------- KEYS DASHBOARD ----------------------
async function viewKeys(){
  content.innerHTML="<h2>Keys</h2><button onclick='generateKey()'>Generate Key</button>";
  const keysSnap = await getDocs(collection(db,"keys"));
  keysSnap.forEach(k=>content.innerHTML+=`<div>${k.data().key}</div>`);
}

async function generateKey(){
  const k = await genKey();
  alert("Generated Key: "+k);
  viewKeys();
}

// ---------------------- SETTINGS ----------------------
function viewSettings(){
  content.innerHTML=`<h2>Settings</h2>
  <div class="card">
    <button onclick="setTheme('#00aaff')">Blue</button>
    <button onclick="setTheme('#a855f7')">Purple</button>
    <button onclick="setTheme('#ff3b3b')">Red</button>
  </div>`;
}
function setTheme(c){
  document.documentElement.style.setProperty('--bg-main',c);
}

// ---------------------- LOGOUT ----------------------
function logout(){ currentUser=null; location.reload(); }
</script>
</body>
</html>
