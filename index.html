<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viper Studios</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#05070d;color:white}
.dashboard{display:flex;height:100vh}
.sidebar{width:230px;background:#020617;padding:15px}
.main{flex:1;padding:20px;overflow:auto}

/* TOAST */
.toast{
 position:fixed;
 top:20px; right:20px;
 background:#0f172a;
 padding:15px;
 border-radius:10px;
 box-shadow:0 0 15px rgba(0,170,255,0.4);
 animation:fade 0.3s;
}
@keyframes fade{from{opacity:0;transform:translateY(-10px)}to{opacity:1}}

.card{background:#0f172a;padding:15px;margin:10px 0;border-radius:10px}
.online{color:lime}
.offline{color:gray}
</style>
</head>

<body>

<div class="dashboard" id="dash" style="display:none">
  <div class="sidebar">
    <button onclick="home()">Home</button>
    <button onclick="usersView()">Users</button>
    <button onclick="keysView()">Keys</button>
    <button onclick="logout()">Logout</button>
  </div>
  <div class="main" id="content"></div>
</div>

<div id="login">
  <h2>Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" placeholder="Password"><br>
  <input id="key" placeholder="Key"><br>
  <button onclick="login()">Login</button>
</div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_MSG",
  appId: "YOUR_APP"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = null;

// 🔔 TOAST
function notify(msg){
  let t=document.createElement("div");
  t.className="toast";
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// LOGIN
async function login(){
  let u=user.value;
  let p=pass.value;
  let k=key.value;

  let doc=await db.collection("users").doc(u).get();
  let data=doc.data();

  if(k==="viper0118"){
    await db.collection("users").doc(u).set({
      password:p,
      role:"Owner",
      online:true,
      lastActive:Date.now(),
      warnings:[],
      banned:false
    });
    currentUser={username:u,role:"Owner"};
    start();
    return;
  }

  if(!doc.exists){
    await db.collection("users").doc(u).set({
      password:p,
      role:"User",
      online:true,
      lastActive:Date.now(),
      warnings:[],
      banned:false
    });
    currentUser={username:u,role:"User"};
    start();
  } else {
    if(data.password!==p) return notify("Wrong password");
    if(data.banned) return notify("Banned");

    currentUser={username:u,role:data.role};
    await db.collection("users").doc(u).update({
      online:true,
      lastActive:Date.now()
    });

    start();
  }
}

// START
function start(){
  login.style.display="none";
  dash.style.display="flex";
  home();
  trackOnline();
}

// 🟢 ONLINE TRACKING
function trackOnline(){
  setInterval(()=>{
    db.collection("users").doc(currentUser.username).update({
      lastActive:Date.now()
    });
  },5000);
}

// HOME (STATS)
async function home(){
  let snap=await db.collection("users").get();

  let totalUsers=snap.size;
  let warns=0;
  let bans=0;

  snap.forEach(doc=>{
    let d=doc.data();
    warns+=d.warnings.length;
    if(d.banned) bans++;
  });

  content.innerHTML=`
    <h2>Dashboard</h2>
    <div class="card">Users: ${totalUsers}</div>
    <div class="card">Warnings: ${warns}</div>
    <div class="card">Bans: ${bans}</div>
  `;
}

// USERS
function usersView(){
  content.innerHTML="<h2>Users</h2><div id='users'></div>";

  db.collection("users").onSnapshot(snap=>{
    let html="";
    snap.forEach(doc=>{
      let u=doc.data();
      let online=(Date.now()-u.lastActive<10000);

      html+=`
        <div class="card">
          <b>${doc.id}</b>
          <span class="${online?'online':'offline'}">
          ${online?'🟢 Online':'⚪ Offline'}
          </span><br>
          Role: ${u.role}<br>
          Warnings: ${u.warnings.length}<br>

          ${currentUser.role==="Owner" ? `
          <button onclick="warnUser('${doc.id}')">Warn</button>
          <button onclick="banUser('${doc.id}')">Ban</button>
          `:""}

          <button onclick="viewWarns('${doc.id}')">View</button>
        </div>
      `;
    });
    users.innerHTML=html;
  });
}

// WARN
async function warnUser(id){
  let reason=prompt("Reason");
  if(!reason) return;

  let ref=db.collection("users").doc(id);
  let data=(await ref.get()).data();

  data.warnings.push({
    reason,
    by:currentUser.username,
    date:new Date().toLocaleString()
  });

  await ref.update({warnings:data.warnings});
  notify("Warned "+id);
}

// BAN
async function banUser(id){
  let reason=prompt("Reason");
  if(!reason) return;

  let ref=db.collection("users").doc(id);
  let data=(await ref.get()).data();

  data.warnings.push({
    reason:"BAN: "+reason,
    by:currentUser.username,
    date:new Date().toLocaleString()
  });

  await ref.update({
    warnings:data.warnings,
    banned:true
  });

  notify("Banned "+id);
}

// VIEW WARNINGS
async function viewWarns(id){
  let data=(await db.collection("users").doc(id).get()).data();

  content.innerHTML="<h2>Warnings</h2>";

  data.warnings.forEach(w=>{
    content.innerHTML+=`
      <div class="card">
        ${w.reason}<br>
        By: ${w.by}<br>
        ${w.date}
      </div>
    `;
  });
}

// KEYS (simple)
function keysView(){
  content.innerHTML="<h2>Keys (manual system)</h2>";
}

// LOGOUT
async function logout(){
  await db.collection("users").doc(currentUser.username).update({online:false});
  location.reload();
}
</script>

</body>
</html>
