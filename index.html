<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viper Studios Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --main-color:#00aaff;
  --bg-main:#05070d;
  --bg-card:#0f172a;
}
html, body {
  margin:0; padding:0; height:100%;
  font-family:'Fredoka',sans-serif;
  background: linear-gradient(135deg,var(--bg-main),#0a0a0a);
  color:white; overflow:hidden;
}
.auth{display:flex;justify-content:center;align-items:center;height:100vh;}
.box{
  background:rgba(0,0,0,0.9);
  padding:30px; border-radius:20px;
  width:350px; text-align:center;
  box-shadow:0 5px 25px rgba(0,170,255,0.2);
}
input, select, textarea{
  width:100%; padding:12px; margin-top:10px;
  border-radius:12px; border:none;
  background:var(--bg-card); color:white; outline:none;
}
button{
  margin-top:12px; padding:12px; width:100%;
  border:none; border-radius:12px;
  background:linear-gradient(90deg,var(--main-color),#0044ff);
  cursor:pointer; transition:0.2s; font-weight:600;
}
button:hover{transform:scale(1.05);}
.dashboard{display:none;height:100vh;display:flex;}
.sidebar{
  width:250px; background:#020617;
  padding:20px; display:flex; flex-direction:column;
}
.sidebar button{margin-bottom:10px; text-align:left;}
.sidebar button:hover{background:linear-gradient(90deg,var(--main-color),#0044ff);}
.main{flex:1; padding:25px; overflow-y:auto;}
.card{background:var(--bg-card); padding:20px; border-radius:15px; margin-bottom:15px;}
.user-card{background:#020617; padding:15px; border-radius:15px; margin-bottom:10px;}
.admin-btn{
  background:linear-gradient(90deg,#ffb200,#ff6a00);
  padding:10px; margin-top:10px; border-radius:15px;
  font-weight:700; color:white; cursor:pointer; width:100%;
  transition:0.2s;
}
.admin-btn:hover{transform:scale(1.05);}
.popup{position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center;
}
.popup-box{background:var(--bg-card); padding:20px; border-radius:15px; width:400px; text-align:center;}
select{appearance:none;}
</style>
</head>

<body>
<div class="auth" id="auth">
  <div class="box">
    <h2>Viper Studios</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <input id="key" placeholder="VIP Key or Owner Key">
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="sidebar">
    <button onclick="viewHome()">🏠 Home</button>
    <button onclick="viewUsers()">👥 Users</button>
    <button onclick="viewKeys()">🔑 Keys</button>
    <button onclick="viewSettings()">⚙️ Settings</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
  <div class="main" id="content"></div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h3 id="popupTitle"></h3>
    <div id="popupContent"></div>
    <button onclick="closePopup()">Dismiss</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {apiKey:"code fixed ly lamp uwu",authDomain:"viper-studios-746f8.firebaseapp.com",projectId:"viper-studios-746f8"};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;

// ---------------- LOGIN ----------------
window.login = async function(){
  const u = username.value.trim();
  const p = password.value.trim();
  const k = key.value.trim();

  if(!u || !p) return alert("Fill fields");

  let role = "User";

  if(k === "ownerperms") role = "Owner";

  const userRef = doc(db,"users",u);
  const snap = await getDoc(userRef);

  if(!snap.exists()){
    await setDoc(userRef,{
      password:p,
      role:role,
      warnings:[],
      banned:false
    });
  } else {
    const data = snap.data();
    if(data.password !== p) return alert("Wrong password");
    if(data.banned) return alert("You are banned");
    role = data.role;
  }

  currentUser = {username:u, role:role};
  showDash();
};

// ---------------- USERS ----------------
window.viewUsers = async function(){
  const query = await getDocs(collection(db,"users"));
  content.innerHTML = "<h2>Users</h2>";

  query.forEach((docSnap)=>{
    const data = docSnap.data();
    const name = docSnap.id;

    content.innerHTML += `
    <div class="user-card">
      ${name} (${data.role}) ${data.banned?"[BANNED]":""}<br>
      Warnings: ${data.warnings.length}<br>
      <button onclick="warnUser('${name}')">Warn</button>
      <button onclick="banUser('${name}')">Ban</button>
      ${currentUser.role==="Owner" && data.role!=="Owner" ? 
        `<button class="admin-btn" onclick="makeAdmin('${name}')">Make Admin</button>`:""}
    </div>`;
  });
};

// ---------------- WARN ----------------
window.warnUser = async function(name){
  const reason = prompt("Reason?");
  if(!reason) return;

  const ref = doc(db,"users",name);
  const snap = await getDoc(ref);
  let data = snap.data();

  if(data.warnings.length > 0) return alert("Already warned");

  data.warnings.push(reason);

  await updateDoc(ref,{warnings:data.warnings});
  alert("Warned!");
  viewUsers();
};

// ---------------- BAN ----------------
window.banUser = async function(name){
  if(!confirm("Ban user?")) return;

  const ref = doc(db,"users",name);
  const snap = await getDoc(ref);
  let data = snap.data();

  if(data.role === "Owner") return alert("Cannot ban owner");

  await updateDoc(ref,{banned:true});
  alert("Banned!");
  viewUsers();
};

// ---------------- ADMIN ----------------
window.makeAdmin = async function(name){
  const ref = doc(db,"users",name);
  const snap = await getDoc(ref);
  let data = snap.data();

  if(data.role === "Owner") return alert("Cannot change owner");

  await updateDoc(ref,{role:"Admin"});
  alert(name+" is now Admin");
  viewUsers();
};

// ---------------- THEME ----------------
window.setTheme = function(c){
  document.body.style.background = `linear-gradient(135deg, ${c}, #0a0a0a)`;
  document.documentElement.style.setProperty('--main-color', c);
};
</script>
</body>
</html>
