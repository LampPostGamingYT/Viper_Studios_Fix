<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;

// ---------------- LOGIN ----------------
window.login = async function(){
  const u = username.value.trim();
  const p = password.value.trim();
  const k = key.value.trim();

  if(!u || !p) return alert("Fill fields");

  let role = "User";

  if(k === "ownerperms") role = "Owner";

  const userRef = doc(db,"users",u);
  const snap = await getDoc(userRef);

  if(!snap.exists()){
    await setDoc(userRef,{
      password:p,
      role:role,
      warnings:[],
      banned:false
    });
  } else {
    const data = snap.data();
    if(data.password !== p) return alert("Wrong password");
    if(data.banned) return alert("You are banned");
    role = data.role;
  }

  currentUser = {username:u, role:role};
  showDash();
};

// ---------------- USERS ----------------
window.viewUsers = async function(){
  const query = await getDocs(collection(db,"users"));
  content.innerHTML = "<h2>Users</h2>";

  query.forEach((docSnap)=>{
    const data = docSnap.data();
    const name = docSnap.id;

    content.innerHTML += `
    <div class="user-card">
      ${name} (${data.role}) ${data.banned?"[BANNED]":""}<br>
      Warnings: ${data.warnings.length}<br>
      <button onclick="warnUser('${name}')">Warn</button>
      <button onclick="banUser('${name}')">Ban</button>
      ${currentUser.role==="Owner" && data.role!=="Owner" ? 
        `<button class="admin-btn" onclick="makeAdmin('${name}')">Make Admin</button>`:""}
    </div>`;
  });
};

// ---------------- WARN ----------------
window.warnUser = async function(name){
  const reason = prompt("Reason?");
  if(!reason) return;

  const ref = doc(db,"users",name);
  const snap = await getDoc(ref);
  let data = snap.data();

  if(data.warnings.length > 0) return alert("Already warned");

  data.warnings.push(reason);

  await updateDoc(ref,{warnings:data.warnings});
  alert("Warned!");
  viewUsers();
};

// ---------------- BAN ----------------
window.banUser = async function(name){
  if(!confirm("Ban user?")) return;

  const ref = doc(db,"users",name);
  const snap = await getDoc(ref);
  let data = snap.data();

  if(data.role === "Owner") return alert("Cannot ban owner");

  await updateDoc(ref,{banned:true});
  alert("Banned!");
  viewUsers();
};

// ---------------- ADMIN ----------------
window.makeAdmin = async function(name){
  const ref = doc(db,"users",name);
  const snap = await getDoc(ref);
  let data = snap.data();

  if(data.role === "Owner") return alert("Cannot change owner");

  await updateDoc(ref,{role:"Admin"});
  alert(name+" is now Admin");
  viewUsers();
};

// ---------------- THEME ----------------
window.setTheme = function(c){
  document.body.style.background = `linear-gradient(135deg, ${c}, #0a0a0a)`;
  document.documentElement.style.setProperty('--main-color', c);
};
</script>
