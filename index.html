<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viper Studios Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<style>
html, body {margin:0;padding:0;font-family:'Fredoka',sans-serif;height:100%;background:#0f172a;color:white;overflow:hidden;}
input, button, select, textarea {font-family:'Fredoka',sans-serif;}
.auth{display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background: rgba(15,23,42,0.95);backdrop-filter: blur(15px);padding:30px;border-radius:20px;width:350px;text-align:center;box-shadow:0 5px 20px rgba(0,255,200,0.2);}
input, select, textarea{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:none;background:#1e293b;color:white;}
button{margin-top:12px;padding:12px;width:100%;border:none;border-radius:12px;background: linear-gradient(90deg, #00ff88, #00c3ff);cursor:pointer;transition:0.2s;font-weight:600;}
button:hover{transform:scale(1.05);}
.dashboard{display:none;height:100vh;flex:1;display:flex;}
.sidebar{width:250px;background:#111827;padding:20px;box-sizing:border-box;display:flex;flex-direction:column;}
.sidebar h2{margin-top:0;margin-bottom:20px;font-size:1.5em;text-align:center;}
.sidebar button{width:100%;margin-bottom:10px;padding:12px;border:none;border-radius:12px;background:#1f2937;color:white;cursor:pointer;transition:0.2s;text-align:left;display:flex;align-items:center;gap:10px;}
.sidebar button:hover{background:linear-gradient(90deg, #00ff88, #00c3ff);color:black;}
.main{flex:1;padding:30px;overflow-y:auto;}
.card{background:#1e293b;border-radius:15px;padding:20px;margin-bottom:15px;transition:0.3s;cursor:pointer;box-shadow:0 3px 10px rgba(0,255,200,0.1);}
.card:hover{transform:scale(1.03);box-shadow:0 5px 20px rgba(0,255,200,0.3);}
.card h3{margin-top:0;}
.card .stat{font-size:1.2em;margin-top:10px;}
.users-container{display:flex;flex-direction:column;gap:15px;max-height:60vh;overflow-y:auto;}
.user-card{background:#111827;border-radius:15px;padding:15px;width:100%;transition:0.2s;box-shadow:0 2px 10px rgba(0,255,200,0.1);}
.user-card:hover{transform:scale(1.02);box-shadow:0 5px 15px rgba(0,255,200,0.3);}
.user-card span.ban{color:red;font-weight:600;}
.user-card span.warn{color:orange;font-weight:600;}
.user-card button{margin-top:8px;width:100%;padding:8px;border:none;border-radius:10px;background:#00c3ff;color:black;cursor:pointer;transition:0.2s;}
.user-card button:hover{transform:scale(1.05);background:#00ff88;}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background: rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;z-index:100;}
.popup-box{width:400px;max-height:80vh;overflow-y:auto;background:#1e293b;padding:25px;border-radius:20px;box-shadow:0 5px 20px rgba(0,255,200,0.3);}
.popup-box button{margin-top:15px;width:100%;background:#00ff88;color:black;}
textarea{height:80px;resize:none;}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth" id="auth">
  <div class="box">
    <h2>Viper Studios</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <input id="discord" placeholder="Discord">
    <input id="roblox" placeholder="Roblox">
    <input id="key" placeholder="Key">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="sidebar">
    <h2>Viper</h2>
    <button onclick="viewHome()">🏠 Home</button>
    <button onclick="viewUsers()">👥 Users</button>
    <button onclick="viewSettings()">⚙️ Settings</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
  <div class="main" id="content"></div>
</div>

<!-- MODAL POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h3 id="popupTitle">Popup</h3>
    <div id="popupContent"></div>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
// ================== CONFIG ==================
const webhookURL = "https://ptb.discord.com/api/webhooks/1485847717828624585/qetMKy34kRdXJOFNyAPfAKu79X5HDHElmz5jQ16dhNfmM_QWx36pAbPH1pytkEEZulGN"; // replace this

function logAction(message){
  fetch(webhookURL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({content: message})
  }).catch(console.error);
}

// ================== VARIABLES ==================
const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const discordInput = document.getElementById("discord");
const robloxInput = document.getElementById("roblox");
const keyInput = document.getElementById("key");
const content = document.getElementById("content");

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;

// ================== LOGIN/REGISTER ==================
function login(){
  const username = usernameInput.value.trim();
  const password = passwordInput.value.trim();
  const key = keyInput.value.trim();
  if(!username || !password || !key) return alert("Enter username, password & key!");

  users = JSON.parse(localStorage.getItem("users")) || [];
  let keys = JSON.parse(localStorage.getItem("keys")) || [];

  // FIRST OWNER CHECK
  if(users.length === 0 && key === "viper0118"){
    keys.push("viper0118");
    localStorage.setItem("keys", JSON.stringify(keys));
  }

  if(!keys.includes(key)) return alert("Invalid key!");

  let user = users.find(u=>u.username===username);
  if(!user){
    // FIRST USER WITH KEY = Owner
    let role = (users.length === 0 && key === "viper0118") ? "Owner" : "User";
    user = {username,password,discord:discordInput.value.trim(),roblox:robloxInput.value.trim(),role, warnings:[],banned:false};
    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));
    logAction(`New user registered: ${username} (${role})`);
  } else if(user.password!==password){ 
    return alert("Wrong password!"); 
  } else if(user.banned){ 
    return alert("You are banned"); 
  }

  currentUser = user;
  usernameInput.value=passwordInput.value=discordInput.value=robloxInput.value=keyInput.value="";
  document.getElementById("auth").style.display="none";
  document.getElementById("dashboard").style.display="flex";
  viewHome();
  logAction(`${currentUser.username} logged in successfully.`);
}

function logout(){
  currentUser=null;
  document.getElementById("dashboard").style.display="none";
  document.getElementById("auth").style.display="flex";
  content.innerHTML="";
}

// ================== HOME ==================
function viewHome(){
  content.innerHTML=`
    <h2>Welcome, ${currentUser.username}</h2>
    <div class="card"><h3>Stats</h3><div class="stat">Role: ${currentUser.role}</div></div>
    <div class="card"><h3>Roblox</h3><div class="stat">${currentUser.roblox}</div></div>
    <div class="card"><h3>Discord</h3><div class="stat">${currentUser.discord}</div></div>
  `;
}

// ================== USERS TAB ==================
function viewUsers(){
  users = JSON.parse(localStorage.getItem("users")) || [];
  content.innerHTML=`
    <h2>Players</h2>
    <input id="userSearch" placeholder="Search by username, Discord, or Roblox..." style="width:100%; padding:10px; margin-bottom:15px; border-radius:10px; border:none; background:#1e293b; color:white;">
    <div style="margin-bottom:15px;">
      <input id="newRole" placeholder="New Role Name" style="width:60%; padding:8px; border-radius:10px; border:none; background:#1e293b; color:white;">
      <button onclick="createRole()" style="width:35%; margin-left:5px;">Create Role</button>
    </div>
    <div class='users-container'></div>
  `;
  const container=document.querySelector(".users-container");
  const displayUsers = [currentUser, ...users.filter(u => u.username !== currentUser.username)];

  function renderUsers(list){
    container.innerHTML="";
    list.forEach((u)=>{
      const realIndex = users.findIndex(x => x.username === u.username);
      let buttonsHTML="";
      if(currentUser.role==="Owner" || u.username===currentUser.username){
        buttonsHTML=`
          <button onclick="warnUser(${realIndex})">Warn</button>
          <button onclick="banUser(${realIndex})">Ban</button>
        `;
      }

      const div=document.createElement("div");
      div.className="user-card";
      div.innerHTML=`<b>${u.username}</b> ${u.banned?"<span class='ban'>(BANNED)</span>":""}<br>
        Discord: ${u.discord}<br>
        Roblox: ${u.roblox}<br>
        Role: ${u.role || 'User'}<br>
        Warnings: ${u.warnings.length}<br><br>
        ${buttonsHTML}
        <button onclick="viewWarnings(${realIndex})">View Warnings</button>
        <button onclick="assignRolePopup(${realIndex})">Assign Role</button>`;
      container.appendChild(div);
    });
  }

  renderUsers(displayUsers);

  const searchInput = document.getElementById("userSearch");
  searchInput.addEventListener("input", ()=>{
    const query = searchInput.value.toLowerCase();
    const filtered = displayUsers.filter(u => 
      u.username.toLowerCase().includes(query) || 
      u.discord.toLowerCase().includes(query) || 
      u.roblox.toLowerCase().includes(query)
    );
    renderUsers(filtered);
  });
}

// ================== ROLE ==================
function createRole(){
  const roleInput = document.getElementById("newRole");
  const roleName = roleInput.value.trim();
  if(!roleName) return alert("Enter a role name!");
  let roles = JSON.parse(localStorage.getItem("roles")) || [];
  if(roles.includes(roleName)) return alert("Role already exists!");
  roles.push(roleName);
  localStorage.setItem("roles", JSON.stringify(roles));
  alert(`Role "${roleName}" created!`);
  roleInput.value="";
  logAction(`${currentUser.username} created role "${roleName}"`);
}

function assignRolePopup(userIndex){
  let roles = JSON.parse(localStorage.getItem("roles")) || [];
  if(roles.length===0) return alert("No roles exist! Create a role first.");

  let html=`<label>Select Role:</label>
    <select id="roleSelect">${roles.map(r=>`<option value="${r}">${r}</option>`).join('')}</select><br><br>
    <label><input type="checkbox" id="makeAdmin"> Make Admin?</label><br><br>
    <button onclick="assignRole(${userIndex})">Assign Role</button>`;
  showPopup("Assign Role", html);
}

function assignRole(userIndex){
  const roleName = document.getElementById("roleSelect").value;
  const makeAdmin = document.getElementById("makeAdmin").checked;
  users[userIndex].role = makeAdmin ? "Admin" : roleName;
  save();
  closePopup();
  viewUsers();
  logAction(`${currentUser.username} assigned role "${roleName}" to ${users[userIndex].username} ${makeAdmin ? "(Made Admin)" : ""}`);
}

// ================== WARN & BAN ==================
function warnUser(userIndex){showInfractionPopup(userIndex,'warn');}
function banUser(userIndex){showInfractionPopup(userIndex,'ban');}
function showInfractionPopup(userIndex,type){
  const u=users[userIndex];
  let html=`<label>Reason:</label>
    <textarea id="infractionReason" placeholder="Describe the reason..."></textarea>
    <button onclick="submitInfraction(${userIndex},'${type}')">${type==="warn"?"Issue Warning":"Ban User"}</button>`;
  showPopup(`${type==="warn"?"Warn":"Ban"} User: ${u.username}`, html);
}
function submitInfraction(userIndex,type){
  const reason=document.getElementById("infractionReason").value.trim();
  if(!reason) return alert("Enter a reason!");
  users[userIndex].warnings.push({type:type,reason,by:currentUser.username,date:new Date().toLocaleString()});
  if(type==="ban") users[userIndex].banned=true;
  save();
  closePopup();
  viewUsers();
  logAction(`${currentUser.username} ${type}ed ${users[userIndex].username} for: ${reason}`);
}

// ================== VIEW WARNINGS ==================
function viewWarnings(i){
  const u=users[i];
  document.getElementById("popup").style.display="flex";
  document.getElementById("popupTitle").innerText="Infractions for "+u.username;
  document.getElementById("popupContent").innerHTML=u.warnings.map(w=>`
    <div class="card"><b>${w.type.toUpperCase()}</b>: ${w.reason}<br>By: ${w.by}<br>${w.date}</div>
  `).join("") || "No infractions";
}

// ================== POPUP ==================
function showPopup(title,html){
  document.getElementById("popupTitle").innerText=title;
  document.getElementById("popupContent").innerHTML=html;
  document.getElementById("popup").style.display="flex";
}
function closePopup(){document.getElementById("popup").style.display="none";}
function save(){localStorage.setItem("users",JSON.stringify(users));}

// ================== SETTINGS & KEY GENERATOR ==================
function generateKey() {
  let keys = JSON.parse(localStorage.getItem("keys")) || [];
  const key = 'VIP-' + Math.random().toString(36).substring(2,10).toUpperCase();
  keys.push(key);
  localStorage.setItem("keys", JSON.stringify(keys));
  alert(`Generated Key: ${key}`);
  logAction(`${currentUser.username} generated a new key: ${key}`);
}

function viewSettings(){
  content.innerHTML=`
    <h2>Settings</h2>
    <button onclick="generateKey()">Generate Key</button>
  `;
}
</script>
</body>
</html>
